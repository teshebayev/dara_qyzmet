<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dara Kyzmet</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#00B140;--green-h:#009938;--green-50:#E8F8EE;--ink:#14181F;--muted:#6B7280;
--bg:#F4F6F8;--surface:#fff;--border:#ECEEF1;--danger:#E5484D;--warning:#F5A623;--info:#2F80ED;
--r:20px;--rc:12px;--pill:999px;--sh:0 4px 24px rgba(20,24,31,.06);--font:"Golos Text",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.45}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
.nav{display:flex;align-items:center;gap:20px;height:64px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}
.logo .m{width:32px;height:32px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800;box-shadow:0 4px 12px rgba(0,177,64,.35)}
.logo b{color:var(--green)}
.nav .who{margin-left:auto;color:var(--muted);font-size:14px}
.btn{border-radius:var(--pill);font-weight:600;padding:10px 18px;font-size:14px;cursor:pointer;border:1.5px solid transparent;font-family:var(--font)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-h)}
.btn-white{background:#fff;color:var(--ink);border-color:var(--border)}
.btn-black{background:var(--ink);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-top:16px}
h2{font-size:22px;font-weight:800;letter-spacing:-.4px;margin:24px 0 4px}
.muted{color:var(--muted)}
.chip{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--pill)}
.c-green{background:var(--green-50);color:var(--green-h)}.c-amber{background:#FCF3E2;color:#b9770f}
.c-red{background:#FCEDED;color:var(--danger)}.c-blue{background:#e8f0fd;color:var(--info)}.c-gray{background:#eef0f3;color:#3A4150}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;padding:8px 10px}
td{padding:11px 10px;border-top:1px solid var(--border);font-size:14px}
.num{text-align:right;font-variant-numeric:tabular-nums}
input,select{font:inherit;border:1.5px solid var(--border);border-radius:var(--rc);padding:9px 11px;background:#fff}
input:focus,select:focus{outline:none;border-color:var(--green)}
.cell{width:80px;text-align:right;border-radius:8px;padding:6px 8px}
.low{background:#FCF3E2;border-color:#f0c879}
.hide{display:none}
.totbar{display:flex;justify-content:flex-end;gap:30px;align-items:flex-end;margin-top:14px;padding-top:14px;border-top:2px solid var(--border)}
.totbar .l{color:var(--muted);font-size:12px}.totbar .v{font-size:24px;font-weight:800}
.v.green{color:var(--green)}
.login{max-width:380px;margin:9vh auto}
.login .card>*{width:100%;margin-top:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.disc{display:grid;grid-template-columns:1.4fr .7fr 1fr 1fr;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:var(--rc);margin-top:8px}
.seg button{border:1.5px solid var(--border);background:#fff;border-radius:var(--pill);padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.seg button.on{color:#fff;border-color:transparent}
.seg button.on.shortage{background:var(--danger)}.seg button.on.misgrade{background:var(--info)}
.seg button.on.surplus{background:var(--warning)}.seg button.on.defect{background:var(--ink)}
.delta{font-weight:700;font-variant-numeric:tabular-nums}.delta.minus{color:var(--danger)}.delta.plus{color:var(--green)}
.agent{position:fixed;right:18px;bottom:18px;width:330px;z-index:40}
.agent .box{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(20,24,31,.18);padding:14px}
.agent .log{max-height:230px;overflow:auto;font-size:13.5px;margin-bottom:8px}
.agent .msg{margin:6px 0;padding:8px 10px;border-radius:10px}
.agent .u{background:var(--green-50)}.agent .a{background:#f1f2f4}
.fab{width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 8px 24px rgba(0,177,64,.4);float:right}
.err{color:var(--danger);font-size:13px;margin-top:6px}
footer{color:var(--muted);font-size:12px;text-align:center;padding:28px}
</style>

<header><div class="wrap nav">
  <div class="logo"><span class="m">D</span>Dara <b>Kyzmet</b></div>
  <span class="who" id="who"></span>
  <button class="btn btn-white btn-sm hide" id="logout">Выйти</button>
</div></header>

<main class="wrap" id="app"></main>
<footer>Dara Kyzmet · приёмка накладных · стиль Halyk</footer>

<!-- Агент поддержки -->
<div class="agent">
  <div class="box hide" id="agentBox">
    <div class="row" style="justify-content:space-between"><b>Поддержка</b><span class="muted" style="cursor:pointer" onclick="toggleAgent()">✕</span></div>
    <div class="log" id="agentLog"><div class="msg a">Спросите про остатки, заявки или расхождения.</div></div>
    <div class="row"><input id="agentIn" placeholder="сколько молока на складе?" style="flex:1"><button class="btn btn-green btn-sm" onclick="askAgent()">→</button></div>
  </div>
  <button class="fab" onclick="toggleAgent()">🤖</button>
</div>

<script>
const API = ""; // тот же origin
let token = null, me = null, currentAcc = null, fmt = n => Math.round(n).toLocaleString('ru-RU')+' ₸';

async function api(path, opts={}){
  opts.headers = Object.assign({}, opts.headers, token?{Authorization:'Bearer '+token}:{});
  if(opts.json){ opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(opts.json); delete opts.json; }
  const r = await fetch(API+path, opts);
  if(!r.ok){ throw new Error((await r.json().catch(()=>({detail:r.statusText}))).detail); }
  return r.status===204?null:r.json();
}

// ---------- LOGIN ----------
function loginView(){
  document.getElementById('app').innerHTML = `
    <div class="login"><h2>Вход</h2>
    <div class="card">
      <input id="email" value="store@dara.kz" placeholder="email">
      <input id="pass" type="password" value="demo12345" placeholder="пароль">
      <button class="btn btn-green" onclick="doLogin()">Войти как магазин</button>
      <button class="btn btn-white" onclick="document.getElementById('email').value='dist@dara.kz';doLogin()">Войти как поставщик</button>
      <div class="err" id="loginErr"></div>
      <div class="muted" style="font-size:12px">демо: store@dara.kz / dist@dara.kz · пароль demo12345</div>
    </div></div>`;
}
async function doLogin(){
  try{
    const d = await api('/api/v1/auth/login',{json:{email:email.value,password:pass.value}});
    token = d.access_token; me = await api('/api/v1/auth/me');
    document.getElementById('who').textContent = me.full_name+' · '+(me.role==='store'?'магазин':'поставщик');
    document.getElementById('logout').classList.remove('hide');
    me.role==='store'? ordersView() : supplierView();
  }catch(e){ document.getElementById('loginErr').textContent = e.message; }
}
document.getElementById('logout').onclick = ()=>{token=null;me=null;document.getElementById('who').textContent='';document.getElementById('logout').classList.add('hide');loginView();};

// ---------- STORE: ORDERS ----------
const STAT = {new:['Новая','c-blue'],shipped:['Отгружен','c-amber'],receiving:['Приёмка','c-amber'],
  accepted:['Принято','c-green'],discrepancy:['Расхождение','c-red'],act_created:['Акт','c-red'],
  invoice_corrected:['Счёт скорр.','c-green'],closed:['Закрыта','c-gray'],cancelled:['Отменена','c-gray']};
async function ordersView(){
  const orders = await api('/api/v1/orders');
  document.getElementById('app').innerHTML = `<h2>Заявки</h2><div class="card" id="ord"></div>`;
  const rows = orders.map(o=>{const s=STAT[o.status]||[o.status,'c-gray'];
    return `<tr><td><b>${o.id.slice(0,8)}</b><br><span class="muted">${o.items.length} позиций</span></td>
      <td><span class="chip ${s[1]}">${s[0]}</span></td>
      <td class="num">${['shipped','receiving'].includes(o.status)?`<button class="btn btn-green btn-sm" onclick="startAcceptance('${o.id}')">Принять</button>`:''}</td></tr>`;}).join('');
  document.getElementById('ord').innerHTML = `<table><tbody>${rows}</tbody></table>`;
}

// ---------- ACCEPTANCE ----------
async function startAcceptance(orderId){
  document.getElementById('app').innerHTML = `<h2>Приёмка</h2>
    <div class="card"><div class="row"><b>Загрузите фото или PDF накладной</b>
    <input type="file" id="file" accept="image/*,application/pdf"><button class="btn btn-green btn-sm" onclick="uploadInvoice('${orderId}')">Распознать</button></div>
    <div class="muted" style="font-size:13px;margin-top:6px">В демо-режиме (mock) распознавание вернёт типовую накладную независимо от файла.</div>
    <div class="err" id="upErr"></div></div>
    <div id="review"></div>`;
}
async function uploadInvoice(orderId){
  const f = document.getElementById('file').files[0];
  const fd = new FormData(); fd.append('file', f || new Blob(['x'],{type:'image/png'}), 'invoice.png');
  try{
    const inv = await api(`/api/v1/orders/${orderId}/invoice/upload`,{method:'POST',body:fd});
    const acc = await api(`/api/v1/orders/${orderId}/acceptance`,{method:'POST'});
    currentAcc = acc.id;
    renderReview(inv, acc.id);
  }catch(e){ document.getElementById('upErr').textContent = e.message; }
}
function renderReview(inv, accId){
  const rows = inv.items.map(it=>`<tr>
    <td>${it.name}${it.was_edited?' <span style="color:var(--green)">●</span>':''}</td>
    <td class="num"><input class="cell ${it.confidence<0.8?'low':''}" value="${it.qty}" onchange="editItem('${it.id}','qty',this.value,'${accId}')"></td>
    <td class="num"><input class="cell ${it.confidence<0.8?'low':''}" value="${it.price}" onchange="editItem('${it.id}','price',this.value,'${accId}')"></td>
    <td class="num" id="lt-${it.id}">${fmt(it.line_total)}</td>
    <td class="num"><button class="btn btn-white btn-sm" onclick="addDisc('${accId}','${it.id}','${it.name.replace(/'/g,'')}',${it.qty},${it.price})">расхождение</button></td>
  </tr>`).join('');
  document.getElementById('review').innerHTML = `
   <div class="card"><div class="row" style="justify-content:space-between">
     <b>${inv.supplier_name||'—'} · № ${inv.invoice_number||'—'} · ${inv.invoice_date||''}</b>
     <span class="chip c-green">распознано</span></div>
     <table style="margin-top:10px"><thead><tr><th>Товар</th><th class="num">Кол-во</th><th class="num">Цена</th><th class="num">Сумма</th><th></th></tr></thead>
     <tbody>${rows}</tbody></table>
   </div>
   <h2 style="font-size:18px">Расхождения</h2>
   <div class="card"><div id="discList" class="muted" style="font-size:13px">Пока нет. Нажмите «расхождение» у позиции.</div>
     <div class="totbar"><div style="text-align:right"><div class="l">По накладной</div><div class="v" id="orig" style="font-size:16px">${fmt(inv.total_sum||0)}</div></div>
     <div style="text-align:right"><div class="l">К оплате</div><div class="v green" id="corr">${fmt(inv.total_sum||0)}</div></div></div>
     <div class="row" style="justify-content:flex-end;margin-top:14px">
       <button class="btn btn-white" onclick="makeAct('${accId}')">Сформировать акт</button>
       <button class="btn btn-green" onclick="acceptAll('${accId}')">Подтвердить приёмку</button>
     </div>
     <div class="err" id="accErr"></div>
   </div>`;
}
async function editItem(id, field, value, accId){
  const inv = await api(`/api/v1/invoice-items/${id}`,{method:'PATCH',json:{[field]:Number(value)}});
  const it = inv.items.find(x=>x.id===id); if(it) document.getElementById('lt-'+id).textContent = fmt(it.line_total);
}
window._discDraft = {};
function addDisc(accId, itemId, name, qty, price){
  const id = 'd'+Date.now();
  _discDraft[id] = {invoice_item_id:itemId, name, qty, price, type:'shortage', qty_actual:qty};
  const el = document.createElement('div'); el.className='disc'; el.id=id;
  el.innerHTML = `<div><b>${name}</b><br><span class="muted" style="font-size:12px">накладная: ${qty} × ${price}</span></div>
    <input class="cell" value="${qty}" onchange="_discDraft['${id}'].qty_actual=Number(this.value)">
    <div class="seg" data-id="${id}">
      <button class="on shortage" onclick="pickType('${id}','shortage',this)">недостача</button>
      <button onclick="pickType('${id}','misgrade',this)">пересорт</button>
    </div>
    <button class="btn btn-green btn-sm" onclick="saveDisc('${accId}','${id}')">сохранить</button>`;
  const list = document.getElementById('discList'); if(list.classList.contains('muted')){list.classList.remove('muted');list.innerHTML='';}
  list.appendChild(el);
}
function pickType(id,t,btn){ _discDraft[id].type=t; btn.parentElement.querySelectorAll('button').forEach(b=>b.className=''); btn.className='on '+t; }
async function saveDisc(accId, id){
  const d = _discDraft[id];
  const body = {invoice_item_id:d.invoice_item_id, type:d.type, qty_actual:d.qty_actual};
  if(d.type==='misgrade') body.price_new = d.price; // демо: цена пришедшего = той же
  try{
    const res = await api(`/api/v1/acceptance/${accId}/discrepancies`,{method:'POST',json:body});
    document.getElementById('corr').textContent = fmt(res.corrected_sum);
    document.getElementById('orig').textContent = fmt(res.original_sum);
    document.getElementById(id).insertAdjacentHTML('beforeend',`<span class="delta ${res.total_delta<0?'minus':'plus'}" style="grid-column:1/-1">итог изменён: ${res.total_delta<0?'−':'+'} ${Math.abs(res.total_delta).toLocaleString('ru-RU')} ₸</span>`);
  }catch(e){ document.getElementById('accErr').textContent = e.message; }
}
async function acceptAll(accId){
  try{ await api(`/api/v1/acceptance/${accId}/accept`,{method:'POST'}); alert('Приёмка подтверждена, товары в стоке'); ordersView(); }
  catch(e){ document.getElementById('accErr').textContent = e.message; }
}
async function makeAct(accId){
  try{ const a = await api(`/api/v1/acceptance/${accId}/act`,{method:'POST'});
    alert(`Акт ${a.number}\nПо накладной: ${fmt(a.original_sum)}\nК оплате: ${fmt(a.corrected_sum)}\nРазница: ${fmt(a.total_delta)}`); ordersView(); }
  catch(e){ document.getElementById('accErr').textContent = e.message; }
}

// ---------- SUPPLIER ----------
async function supplierView(){
  const acts = await api('/api/v1/supplier/acts');
  const rows = acts.map(a=>`<tr><td><b>${a.number}</b></td><td class="num">${fmt(a.original_sum)}</td>
    <td class="num"><b>${fmt(a.corrected_sum)}</b></td><td><span class="chip ${a.status==='corrected'?'c-green':'c-amber'}">${a.status}</span></td>
    <td>${a.status!=='corrected'?`<button class="btn btn-green btn-sm" onclick="correct('${a.id}')">Скорректировать счёт</button>`:''}</td></tr>`).join('');
  document.getElementById('app').innerHTML = `<h2>Акты расхождений</h2><div class="card">
    <table><thead><tr><th>Акт</th><th class="num">Было</th><th class="num">Стало</th><th>Статус</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td class="muted">Актов пока нет</td></tr>'}</tbody></table></div>`;
}
async function correct(actId){ await api(`/api/v1/acts/${actId}/correct-invoice`,{method:'POST'}); supplierView(); }

// ---------- AGENT ----------
function toggleAgent(){ document.getElementById('agentBox').classList.toggle('hide'); }
async function askAgent(){
  const inp = document.getElementById('agentIn'); const q = inp.value.trim(); if(!q) return;
  const log = document.getElementById('agentLog');
  log.insertAdjacentHTML('beforeend',`<div class="msg u">${q}</div>`); inp.value='';
  try{ const r = await api('/api/v1/agent/ask',{json:{message:q}});
    log.insertAdjacentHTML('beforeend',`<div class="msg a">${r.answer}</div>`); }
  catch(e){ log.insertAdjacentHTML('beforeend',`<div class="msg a">Ошибка: ${e.message}</div>`); }
  log.scrollTop = log.scrollHeight;
}

loginView();
</script>
