server {
  listen 80;
  client_max_body_size 25m;

  # API и служебные пути -> бэкенд (имя сервиса в сети compose)
  location /api/         { proxy_pass http://api:8000; proxy_set_header Host $host; }
  location /health       { proxy_pass http://api:8000; }
  location /docs         { proxy_pass http://api:8000; }
  location /openapi.json { proxy_pass http://api:8000; }

  # SPA: всё остальное отдаём из собранного React
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
